databases:
  - name: hit-training-db
    databaseName: training_app
    plan: free

services:
  - type: web
    name: hit-training-app
    env: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hit-training-db
          property: connectionString
